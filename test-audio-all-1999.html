    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #1a1a1a; color: #fff; }

        h1 { text-align: center; color: #4CAF50; }
        .search-box { width: 100%; padding: 10px; margin: 20px 0; font-size: 16px; background: #333; color: #fff; border: 1px solid #555; border-radius: 5px; }
        .category { margin: 30px 0; border: 1px solid #444; border-radius: 8px; overflow: hidden; }
        .category-header { background: #2196F3; padding: 15px; cursor: pointer; font-weight: bold; font-size: 18px; display: flex; justify-content: space-between; align-items: center; }
        .category-header:hover { background: #1976D2; }
        .category-content { padding: 15px; background: #2a2a2a; display: none; }
        .category-content.active { display: block; }
        .sound-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 6px; max-height: 500px; overflow-y: auto; padding: 10px; background: #333; border-radius: 5px; }
        .sound-btn { 
            padding: 6px 10px; 
            background: #444; 
            color: #fff; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            font-size: 9px; 
            text-align: left;
            transition: all 0.2s;
            word-break: break-all;
            line-height: 1.2;
        }
        .sound-btn:hover { background: #555; transform: translateY(-1px); }
        .sound-btn:active { background: #666; transform: scale(0.98); }
        .playing { background: #4CAF50 !important; box-shadow: 0 0 10px #4CAF50; }
        audio { display: block; margin-top: 20px; width: 100%; background: #333; border-radius: 5px; }
        .stats { text-align: center; margin: 20px 0; color: #888; font-size: 18px; }
        .controls { text-align: center; margin: 20px 0; }
        .control-btn { padding: 10px 20px; margin: 0 5px; background: #FF9800; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 14px; }
        .control-btn:hover { background: #F57C00; }
        .sound-count { background: #FF9800; color: white; padding: 2px 8px; border-radius: 12px; font-size: 12px; }
        .loading { text-align: center; color: #4CAF50; font-size: 20px; padding: 40px; }
        .progress { width: 100%; height: 20px; background: #333; border-radius: 10px; overflow: hidden; margin: 20px 0; }
        .progress-bar { height: 100%; background: #4CAF50; transition: width 0.3s; }
        .error { color: #ff6b6b; text-align: center; padding: 10px; background: #333; border-radius: 5px; margin: 10px 0; }
        .success { color: #4CAF50; text-align: center; padding: 10px; background: #333; border-radius: 5px; margin: 10px 0; }
    </style>

        function groupSoundsByCategory() {
            categories = {
                'DSGNImpt': { name: '💥 Important Design', files: [], icon: '💥' },
                'DSGNMisc': { name: '🎨 Miscellaneous Design', files: [], icon: '🎨' },
                'DSGNSynth': { name: '🎹 Synthetic Sounds', files: [], icon: '🎹' },
                'DSGNTonl': { name: '🎵 Tonal Sounds', files: [], icon: '🎵' },
                'FEETMisc': { name: '👣 Footsteps & Movement', files: [], icon: '👣' },
                'FGHTImpt': { name: '⚔️ Fighting Important', files: [], icon: '⚔️' },
                'MAGAngl': { name: '✨ Angelic Magic', files: [], icon: '✨' },
                'MAGSpel': { name: '🔮 Spell Casting', files: [], icon: '🔮' },
                'SWSH': { name: '🌊 Sweoshes & Whooshes', files: [], icon: '🌊' },
                'UIClick': { name: '🖱️ UI Clicks', files: [], icon: '🖱️' },
                'UIGlitch': { name: '⚡ UI Glitches', files: [], icon: '⚡' },
                'UIMisc': { name: '🎛️ UI Miscellaneous', files: [], icon: '🎛️' },
                'Original': { name: '🎵 Original UI Sounds', files: [], icon: '🎵' }
            };
            
            allSoundFiles.forEach(file => {
                if (file.startsWith('sd/DSGNImpt_')) {
                    categories.DSGNImpt.files.push(file);
                } else if (file.startsWith('sd/DSGNMisc_')) {
                    categories.DSGNMisc.files.push(file);
                } else if (file.startsWith('sd/DSGNSynth_')) {
                    categories.DSGNSynth.files.push(file);
                } else if (file.startsWith('sd/DSGNTonl_')) {
                    categories.DSGNTonl.files.push(file);
                } else if (file.startsWith('sd/FEETMisc_')) {
                    categories.FEETMisc.files.push(file);
                } else if (file.startsWith('sd/FGHTImpt_')) {
                    categories.FGHTImpt.files.push(file);
                } else if (file.startsWith('sd/MAGAngl_')) {
                    categories.MAGAngl.files.push(file);
                } else if (file.startsWith('sd/MAGSpel_')) {
                    categories.MAGSpel.files.push(file);
                } else if (file.startsWith('sd/SWSH_')) {
                    categories.SWSH.files.push(file);
                } else if (file.startsWith('sd/UIClick_')) {
                    categories.UIClick.files.push(file);
                } else if (file.startsWith('sd/UIGlitch_')) {
                    categories.UIGlitch.files.push(file);
                } else if (file.startsWith('sd/UIMisc_')) {
                    categories.UIMisc.files.push(file);
                } else {
                    categories.Original.files.push(file);
                }
            });
        }

        async function createCategories() {
            const categoriesContainer = document.getElementById('categories');
            let html = '';
            
            Object.keys(categories).forEach(categoryKey => {
                const category = categories[categoryKey];
                
                html += `
                    <div class="category">
                        <div class="category-header" onclick="toggleCategory(this)">
                            <span>${category.icon} ${category.name}</span>
                            <span class="sound-count">${category.files.length}</span>
                        </div>
                        <div class="category-content">
                            <div class="sound-grid">
                `;
                
                category.files.forEach(file => {
                    const displayName = file.replace('sd/', '').replace('.wav', '').replace(/_/g, ' ');
                    html += `<button class="sound-btn" onclick="playSound('${file}')">${displayName}</button>`;
                });
                
                html += `
                            </div>
                        </div>
                    </div>
                `;
            });
            
            categoriesContainer.innerHTML = html;
            
            // Auto-expand first category
            setTimeout(() => {
                document.querySelector('.category-content')?.classList.add('active');
            }, 100);
        }

        function enableControls() {
            document.querySelectorAll('.control-btn').forEach(btn => {
                if (btn.id !== 'loadBtn') {
                    btn.disabled = false;
                }
            });
            document.getElementById('searchBox').disabled = false;
            document.getElementById('loadBtn').style.display = 'none';
        }

        function playSound(filename) {
            const player = document.getElementById('player');
            const button = event.target;
            
            // Remove playing class from previous button
            if (currentPlayingButton) {
                currentPlayingButton.classList.remove('playing');
            }
            
            // Add playing class to current button
            button.classList.add('playing');
            currentPlayingButton = button;
            
            // Play the sound - FIXED PATH: remove the 'sd/' prefix since we're in the same directory
            const fullPath = 'web/public/assets/audio/' + filename;
            player.src = fullPath;
            
            player.play().catch(e => {
                console.error('Play failed:', e);
                button.classList.remove('playing');
                currentPlayingButton = null;
                
                // Log error
                const statusLog = document.getElementById('status-log');
                const errorMsg = `<div class="error">❌ Failed to load: ${filename}<br>Error: ${e.message}</div>`;
                statusLog.innerHTML = errorMsg + statusLog.innerHTML;
            });
            
            // Remove playing class when sound ends
            player.onended = () => {
                button.classList.remove('playing');
                currentPlayingButton = null;
            };
        }

        function toggleCategory(header) {
            const content = header.nextElementSibling;
            const isActive = content.classList.contains('active');
            
            if (isActive) {
                content.classList.remove('active');
            } else {
                content.classList.add('active');
            }
        }

        function expandAll() {
            document.querySelectorAll('.category-content').forEach(content => {
                content.classList.add('active');
            });
        }

        function collapseAll() {
            document.querySelectorAll('.category-content').forEach(content => {
                content.classList.remove('active');
            });
        }

        function stopAll() {
            const player = document.getElementById('player');
            player.pause();
            if (currentPlayingButton) {
                currentPlayingButton.classList.remove('playing');
                currentPlayingButton = null;
            }
        }

        async function loadAllSounds() {
            const loadBtn = document.getElementById('loadBtn');
            const progressBar = document.getElementById('progressBar');
            const statusLog = document.getElementById('status-log');
            
            loadBtn.disabled = true;
            loadBtn.textContent = 'Loading...';
            
            try {
                // Try to load from sound-list.txt file
                allSoundFiles = await loadSoundList();
                
                if (allSoundFiles.length < 1000) {
                    // If we got a fallback list, show warning
                    statusLog.innerHTML = '<div class="error">⚠️ Using fallback sound list. Some sounds may be missing.</div>';
                } else {
                    statusLog.innerHTML = '<div class="success">✅ Successfully loaded all sound files!</div>';
                }
                
                // Group by category
                groupSoundsByCategory();
                
                // Create UI
                await createCategories();
                
                // Enable controls
                enableControls();
                
                // Update stats
                document.getElementById('stats').innerHTML = `📊 <strong>Total Sound Effects: ${allSoundFiles.length}</strong> | Real filenames from sd directory | All sounds ready!`;
                
                progressBar.style.width = '100%';
                
            } catch (error) {
                console.error('Error loading sounds:', error);
                statusLog.innerHTML = `<div class="error">❌ Error loading sounds: ${error.message}</div>`;
            }
        }

        // Search functionality
        document.getElementById('searchBox').addEventListener('input', function(e) {
            const searchTerm = e.target.value.toLowerCase();
            const buttons = document.querySelectorAll('.sound-btn');
            const categories = document.querySelectorAll('.category');
            
            if (searchTerm === '') {
                buttons.forEach(btn => btn.style.display = 'block');
                categories.forEach(cat => cat.style.display = 'block');
                return;
            }
            
            let totalMatches = 0;
            
            categories.forEach(category => {
                const categoryButtons = category.querySelectorAll('.sound-btn');
                let hasVisibleButtons = false;
                
                categoryButtons.forEach(button => {
                    const text = button.textContent.toLowerCase();
                    if (text.includes(searchTerm)) {
                        button.style.display = 'block';
                        hasVisibleButtons = true;
                        totalMatches++;
                    } else {
                        button.style.display = 'none';
                    }
                });
                
                category.style.display = hasVisibleButtons ? 'block' : 'none';
                
                if (hasVisibleButtons) {
                    category.querySelector('.category-content').classList.add('active');
                }
            });
            
            if (totalMatches > 0) {
                document.getElementById('stats').innerHTML = `📊 Found <strong>${totalMatches}</strong> matches for "${searchTerm}" | Total: ${allSoundFiles.length}`;
            }
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                stopAll();
            } else if (e.key === 'e' && e.ctrlKey) {
                e.preventDefault();
                expandAll();
            } else if (e.key === 'c' && e.ctrlKey) {
                e.preventDefault();
                collapseAll();
            } else if (e.key === 'l' && e.ctrlKey) {
                e.preventDefault();
                loadAllSounds();
            } else if (e.key === '/' && !e.ctrlKey && !e.altKey && !e.shiftKey) {
                e.preventDefault();
                document.getElementById('searchBox').focus();
            }
        });

        // Auto-load on page load
        window.addEventListener('load', function() {
            setTimeout(loadAllSounds, 500);
        });
    </script>
